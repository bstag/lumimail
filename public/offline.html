<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#2563eb" />
		<title>You are offline | Lumimail</title>
		<link rel="icon" href="/favicon.ico" />
		<style>
			:root {
				color-scheme: light;
				--surface: #f6f8fc;
				--card: #ffffff;
				--ink: #111827;
				--muted: #5f6b7a;
				--accent: #2563eb;
				--border: #dbe3ef;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				background: var(--surface);
				color: var(--ink);
				font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				line-height: 1.5;
				padding: 24px;
			}

			main {
				width: min(100%, 420px);
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--card);
				padding: 32px;
				box-shadow: 0 24px 60px -44px rgb(37 99 235 / 0.55);
			}

			img {
				width: 56px;
				height: 56px;
				display: block;
				margin-bottom: 24px;
			}

			h1 {
				margin: 0;
				font-size: 1.75rem;
				line-height: 1.15;
				letter-spacing: 0;
			}

			p {
				margin: 12px 0 0;
				color: var(--muted);
			}

			button {
				margin-top: 24px;
				min-height: 40px;
				border: 0;
				border-radius: 6px;
				background: var(--accent);
				color: white;
				font: inherit;
				font-weight: 600;
				padding: 0 18px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<main>
			<img src="/icon-192.png" width="56" height="56" alt="" />
			<h1>You are offline</h1>
			<p>Lumimail needs a network connection to load mail, settings, and account data. Reconnect and try again.</p>
			<button type="button" onclick="window.location.reload()">Retry</button>
		</main>
	</body>
</html>
